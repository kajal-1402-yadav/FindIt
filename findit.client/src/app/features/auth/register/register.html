<div class="auth-page">

  <div class="auth-card">

    <h2>Create Account</h2>

    <form [formGroup]="registerForm" (ngSubmit)="register()">

      <div class="form-group">
        <label>Name</label>
        <input type="text"
               formControlName="name"
               [class.error]="formSubmitted && registerForm.get('name')?.invalid" />
        <div *ngIf="formSubmitted && registerForm.get('name')?.errors" class="error-message">
          <span *ngIf="registerForm.get('name')?.errors?.['required']">Name is required</span>
          <span *ngIf="registerForm.get('name')?.errors?.['minlength']">Name must be at least 2 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email"
               formControlName="email"
               [class.error]="formSubmitted && registerForm.get('email')?.invalid" />
        <div *ngIf="formSubmitted && registerForm.get('email')?.errors" class="error-message">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email'] || registerForm.get('email')?.errors?.['invalidEmail']">Please enter a valid email address</span>
        </div>
      </div>

      <div class="form-group password-group">

        <label>Password</label>

        <div class="password-wrapper">

          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 [class.error]="formSubmitted && registerForm.get('password')?.invalid" />

          <span class="eye-icon" (click)="togglePassword()">
            👁
          </span>

        </div>

        <div *ngIf="getPasswordValidationMessage().length > 0" class="password-requirements">
          <div class="requirements-title">Password must contain:</div>
          <div class="requirement-item" 
               *ngFor="let requirement of getPasswordValidationMessage()"
               [class.valid]="requirement.valid">
            {{ requirement.text }}
          </div>
        </div>

        <div *ngIf="formSubmitted && registerForm.get('password')?.errors" class="error-message">
          <span *ngIf="registerForm.get('password')?.errors?.['required']">Password is required</span>
        </div>

      </div>

      <button type="submit" class="primary-btn">
        Register
      </button>

    </form>

  </div>

</div>
