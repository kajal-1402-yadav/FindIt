<nav class="navbar">

  <div class="logo" routerLink="/">
    FindIt
  </div>

  <div class="nav-links">



    <!-- NOT LOGGED IN -->

    <ng-container *ngIf="!isLoggedIn">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>


      <a routerLink="/login" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Login</a>

      <a routerLink="/register" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Register</a>

    </ng-container>

    <!-- LOGGED IN -->

    <ng-container *ngIf="isLoggedIn">

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>

      <a routerLink="/dashboard">Dashboard</a>

      <a routerLink="/create-item">Report Item</a>

      <!-- <a routerLink="/my-claims">My Claims</a> -->

      <a routerLink="/my-items">My Items</a>

      <!-- USER MENU DROPDOWN -->
      <div class="user-menu" [class.show]="showUserMenu">
        <button class="user-menu-btn" (click)="toggleUserMenu()">
          <span>Account</span>
        </button>
        
        <div class="dropdown-menu" *ngIf="showUserMenu">
          <button class="dropdown-item logout-btn" (click)="logout()">
            Logout
          </button>
          <button class="dropdown-item delete-account-btn" (click)="openDeleteAccountModal()">
            Delete Account
          </button>
        </div>
      </div>

    </ng-container>

  </div>

</nav>

<!-- Click outside handler -->
<div class="click-outside-handler" (click)="closeUserMenu()" *ngIf="showUserMenu"></div>

<!-- DELETE ACCOUNT MODAL -->
<div class="modal-overlay" *ngIf="showDeleteModal" (click)="closeDeleteAccountModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Delete Account</h3>
      <button class="close-btn" (click)="closeDeleteAccountModal()">
        <span class="close-icon">×</span>
      </button>
    </div>

    <div class="modal-body">
      <div class="warning-message">
        <p>⚠️ <strong>Warning:</strong> This action cannot be undone!</p>
        <p>Deleting your account will permanently remove:</p>
        <ul>
          <li>All your reported items</li>
          <li>All your claims</li>
          <li>Your account information</li>
        </ul>
      </div>

      <form (ngSubmit)="deleteAccount()">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="deleteForm.email" name="email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="deleteForm.password" name="password" required>
        </div>

        <div *ngIf="deleteError" class="error-message">
          {{ deleteError }}
        </div>

        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="closeDeleteAccountModal()">
            Cancel
          </button>
          <button type="submit" class="delete-btn">
            Delete Account
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
